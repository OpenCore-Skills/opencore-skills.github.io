<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>OpenCore Skills Admin</title>
    <!-- CDN confiable -->
    <script src="https://cdn.jsdelivr.net/npm/netlify-cms@2.15.0/dist/netlify-cms.js"></script>
  </head>
  <body>
    <div id="nc-root"></div>

    <script>
      window.addEventListener('DOMContentLoaded', function() {
        if (window.CMS) {
          CMS.init({
            config: '/admin/config.yml'
          });
        } else {
          console.error('Netlify/Decap CMS no se cargó correctamente');
        }
      });
    </script>
  </body>
</html>
